<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple of Sirius - Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0b132b; 
            text-align: center;
            overflow: hidden; 
        }
        
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            transform: rotate(90deg); 
            z-index: -1; 
        }
        
        .container {
            /* The background box and shadow have been completely removed! */
            padding: 40px 60px;
            z-index: 1; 
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
            
            /* Dark Red to Dark Blue Gradient Effect */
            background: linear-gradient(to right, #8b0000, #00008b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #4a154b; /* A solid dark reddish-blue */
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .contact-note {
            font-size: 1rem;
            color: #4a154b;
            margin-bottom: 0;
        }

        a {
            color: #00008b; /* Dark Blue */
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #8b0000; /* Changes to Dark Red when hovered */
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    
    <div class="container">
        <h1>Welcome to Temple of Sirius</h1>
        <p>Details are coming soon.</p>
        
        <p class="contact-note">
            Connect with us: <br>
            <a href="mailto:priestessofsiriusstar@gmail.com">priestessofsiriusstar@gmail.com</a>
        </p>
    </div>
</body>
</html>
